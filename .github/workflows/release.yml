name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test -v ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          # GITHUB_TOKEN is used for publishing to the current repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use a PAT for homebrew-tap repository access
          # Create a PAT at https://github.com/settings/tokens with 'repo' scope
          # and add it as a repository secret named HOMEBREW_TAP_TOKEN
          GITHUB_TOKEN_FOR_HOMEBREW_TAP: ${{ secrets.HOMEBREW_TAP_TOKEN }}
